<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة الشهادات عالية الجودة</title>
    <style>
        body { font-family: 'Tajawal', sans-serif; text-align: center; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; }
        canvas { 
            border: 1px solid #eee; 
            max-width: 100%; 
            height: auto; 
            margin-top: 20px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        input { padding: 15px; font-size: 18px; width: 350px; border: 2px solid #e0e0e0; border-radius: 10px; margin-bottom: 15px; text-align: center; }
        button { padding: 15px 30px; background-color: #16a085; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        button:hover { background-color: #1abc9c; }
    </style>
</head>
<body>

    <div class="container">
        <h2 style="color: #2c3e50;">إصدار شهادة التفوق</h2>
        <input type="text" id="nameInput" placeholder="اكتب اسم المبدع هنا...">
        <br>
        <button onclick="downloadPDF()">حفظ الشهادة PDF بجودة عالية</button>
        <br>
        <canvas id="certCanvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');
        const svgImg = new Image();

        // ارفع ملف الـ SVG بجانب ملف الـ HTML
        svgImg.src = 'certificate.svg'; 

        svgImg.onload = function() {
            // رفع الدقة بمقدار مرتين لضمان عدم البكسلة
            const scale = 2; 
            canvas.width = (svgImg.width || 1024) * scale;
            canvas.height = (svgImg.height || 731) * scale;
            
            // تحسين جودة الرسم
            ctx.scale(scale, scale);
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
            
            draw();
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(svgImg, 0, 0, (canvas.width/2), (canvas.height/2));
            
            // إعدادات الخط الاحترافية
            ctx.font = 'bold 38px "Arial"'; 
            ctx.fillStyle = '#1a1a1a';
            ctx.textAlign = 'center';
            
            // الإحداثيات (تم ضبطها لتناسب الشهادة في الصورة)
            // العرض: 512 (منتصف الـ 1024)
            // الارتفاع: تم تعديله ليناسب السطر في الصورة الجديدة
            ctx.fillText(nameInput.value, 512, 600);
        }

        nameInput.addEventListener('input', draw);

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            // استخدام حجم مخصص للـ PDF يطابق أبعاد الكانفاس الأصلية
            const doc = new jsPDF({
                orientation: 'landscape',
                unit: 'px',
                format: [canvas.width / 2, canvas.height / 2]
            });

            // جلب البيانات بأقصى جودة ممكنة
            const imgData = canvas.toDataURL('image/png', 1.0);
            doc.addImage(imgData, 'PNG', 0, 0, canvas.width / 2, canvas.height / 2);
            doc.save(`شهادة_تفوق_${nameInput.value}.pdf`);
        }
    </script>
</body>
</html>
