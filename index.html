<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مولد شهادات الفيكتور الأصلي</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/@pdf-lib/fontkit@0.0.4/dist/fontkit.umd.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f8f9fa; padding: 50px; }
        .box { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); display: inline-block; }
        input { padding: 15px; width: 300px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 20px; text-align: center; }
        button { padding: 15px 30px; background-color: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; font-weight: bold; }
        button:disabled { background-color: #bdc3c7; }
    </style>
</head>
<body>

    <div class="box">
        <h2>إصدار شهادة (Vector PDF)</h2>
        <p>الشهادة ستحمل بجودة الطباعة الأصلية دون أي بكسلة</p>
        <input type="text" id="nameInput" placeholder="اكتب اسم الطالب هنا...">
        <br>
        <button id="downloadBtn" onclick="generatePDF()">تحميل الشهادة PDF</button>
    </div>

    <script>
        async function generatePDF() {
            const name = document.getElementById('nameInput').value;
            if (!name) return alert("الرجاء كتابة الاسم");

            const btn = document.getElementById('downloadBtn');
            btn.disabled = true;
            btn.innerText = "جاري المعالجة...";

            try {
                // 1. تحميل ملف الـ PDF الأصلي (القالب)
                const existingPdfBytes = await fetch('template.pdf').then(res => res.arrayBuffer());

                // 2. تحميل المكتبة والملف
                const { PDFDocument, rgb } = PDFLib;
                const pdfDoc = await PDFDocument.load(existingPdfBytes);
                
                // تسجيل fontkit لتعامل أفضل مع الخطوط (اختياري إذا استخدمت خطوط النظام)
                pdfDoc.registerFontkit(fontkit);

                const pages = pdfDoc.getPages();
                const firstPage = pages[0];
                const { width, height } = firstPage.getSize();

                // 3. إضافة الاسم (الإحداثيات تعتمد على حجم ملفك الـ PDF)
                // في الـ PDF الإحداثيات تبدأ من الأسفل لليسار
                firstPage.drawText(name, {
                    x: width / 2 - (name.length * 5), // محاولة توسيط تقريبية
                    y: 265, // الارتفاع (عدل هذا الرقم ليناسب مكان الاسم في ملفك)
                    size: 35,
                    color: rgb(0.1, 0.1, 0.1),
                });

                // 4. حفظ وتحميل الملف
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `شهادة_${name}.pdf`;
                link.click();

            } catch (error) {
                console.error(error);
                alert("حدث خطأ أثناء تحميل القالب. تأكد من وجود ملف template.pdf");
            } finally {
                btn.disabled = false;
                btn.innerText = "تحميل الشهادة PDF";
            }
        }
    </script>
</body>
</html>
