<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة إصدار الشهادات - مدرسة الإمام يعقوب</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; text-align: center; padding: 40px; }
        .container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: inline-block; }
        input { padding: 15px; width: 350px; font-size: 18px; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        button { padding: 15px 30px; background: #16a085; color: white; border: none; border-radius: 10px; cursor: pointer; font-size: 18px; font-weight: bold; transition: 0.3s; }
        button:hover { background: #1abc9c; }
        canvas { border: 1px solid #eee; max-width: 100%; height: auto; margin-top: 20px; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>إصدار شهادة الطالب المبدع</h2>
        <input type="text" id="nameInput" placeholder="اكتب اسم الطالب هنا...">
        <br>
        <button onclick="downloadPDF()">حفظ الشهادة PDF بجودة عالية</button>
        <br>
        <canvas id="certCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');
        
        // سنستخدم صورة كخلفية للمعاينة (تأكد من وجود صورة بنفس اسم الـ PDF أو حول الـ PDF لصورة PNG وارفعها)
        // إذا كنت تملك نسخة PNG من الشهادة سمّها template-bg.png
        const bgImage = new Image();
        bgImage.src = 'certificate.png.jpg'; // سنستخدم ملفك المرفوع مسبقاً للمعاينة

        bgImage.onload = () => {
            canvas.width = 1024;
            canvas.height = 731;
            draw();
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);
            
            ctx.font = 'bold 36px "Tajawal", Arial';
            ctx.fillStyle = '#1a1a1a';
            ctx.textAlign = 'center';
            // مكان اسم "هشام" في تصميمك هو 512 عرض، و 605 ارتفاع تقريباً
            ctx.fillText(nameInput.value, 512, 605);
        }

        nameInput.addEventListener('input', draw);

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'px',
                format: [1024, 731]
            });

            // جلب البيانات من الكانفاس بأقصى جودة (Super Sampling)
            const imgData = canvas.toDataURL('image/png', 1.0);
            pdf.addImage(imgData, 'PNG', 0, 0, 1024, 731);
            pdf.save(`شهادة_تفوق_${nameInput.value}.pdf`);
        }
    </script>
</body>
</html>
