<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إصدار شهادة</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body {
    text-align: center;
    font-family: Arial;
    margin-top: 50px;
}
input, button {
    padding: 10px;
    font-size: 16px;
    margin: 10px;
}
</style>

</head>
<body>

<h2>إصدار شهادة</h2>

<input type="text" id="name" placeholder="اكتب اسم الطالب">
<br>
<button onclick="generatePDF()">تحميل الشهادة</button>

<script>
async function generatePDF() {

    const name = document.getElementById("name").value;
    if (!name) return alert("اكتب الاسم");

    const existingPdfBytes = await fetch('template.pdf').then(res => res.arrayBuffer());

    const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
    const pages = pdfDoc.getPages();
    const page = pages[0];

    // ✨ كتابة الاسم (مضبوط تقريبًا حسب قالبك)
    page.drawText(name, {
        x: 220,  // ← عدلها إذا احتجت
        y: 360,  // ← هذا مكان الاسم تحت "الطالب:-"
        size: 26
    });

    const pdfBytes = await pdfDoc.save();

    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'certificate.pdf';
    link.click();
}
</script>

</body>
</html>
