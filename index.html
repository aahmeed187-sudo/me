<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة الشهادات الاحترافية</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f0f2f5; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        input { padding: 12px; font-size: 18px; width: 300px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; text-align: center; }
        button { padding: 12px 25px; background-color: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; }
        canvas { border: 1px solid #ccc; max-width: 100%; height: auto; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>إصدار شهادة التفوق</h2>
        <input type="text" id="nameInput" placeholder="اكتب اسم الطالب هنا...">
        <br>
        <button onclick="downloadPDF()">تحميل PDF بجودة عالية</button>
        <br>
        <canvas id="certCanvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');
        const svgImg = new Image();

        // تأكد أن هذا الاسم مطابق تماماً لملفك في GitHub
        svgImg.src = 'certificate.svg'; 

        svgImg.onload = function() {
            // سنضبط الكانفاس ليكون كبيراً جداً (مثلاً 2000 بكسل عرض) لضمان عدم البكسلة
            const scaleFactor = 2; 
            canvas.width = 1200 * scaleFactor; 
            canvas.height = 850 * scaleFactor;
            ctx.scale(scaleFactor, scaleFactor);
            draw();
        };

        function draw() {
            // تنظيف الكانفاس ورسم الصورة
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(svgImg, 0, 0, 1200, 850);
            
            // إعدادات الخط لضمان الظهور
            ctx.fillStyle = "#1a1a1a"; // لون أسود صريح
            ctx.font = "bold 45px Arial"; // حجم كبير وواضح
            ctx.textAlign = "center";
            
            // تعديل مكان الاسم بناءً على صورتك الأخيرة
            // 600 هو المنتصف عرضياً، 580 هو الارتفاع (جرب تغيير هذا الرقم)
            ctx.fillText(nameInput.value, 600, 580); 
        }

        nameInput.addEventListener('input', draw);

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: 'landscape',
                unit: 'px',
                format: [1200, 850]
            });
            const imgData = canvas.toDataURL('image/png', 1.0);
            doc.addImage(imgData, 'PNG', 0, 0, 1200, 850);
            doc.save('certificate.pdf');
        }
    </script>
</body>
</html>
