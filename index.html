<script>
async function generatePDF() {

    try {
        const name = document.getElementById("name").value;
        if (!name) return alert("اكتب الاسم");

        const existingPdfBytes = await fetch('template.pdf');
        
        if (!existingPdfBytes.ok) {
            alert("ملف الشهادة غير موجود!");
            return;
        }

        const pdfBytesArray = await existingPdfBytes.arrayBuffer();

        const pdfDoc = await PDFLib.PDFDocument.load(pdfBytesArray);
        const page = pdfDoc.getPages()[0];

        page.drawText(name, {
            x: 220,
            y: 360,
            size: 26
        });

        const pdfBytes = await pdfDoc.save();

        // ✅ تحميل بطريقة مضمونة
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "certificate.pdf";
        document.body.appendChild(a);
        a.click();

        document.body.removeChild(a);
        URL.revokeObjectURL(url);

    } catch (error) {
        console.error(error);
        alert("صار خطأ، افتح F12 وشوف Console");
    }
}
</script>
