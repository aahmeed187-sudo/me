<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة إصدار الشهادات | إعداد الأستاذ أحمد</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&family=Amiri:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #c0392b;
            --bg-color: #f8f9fa;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--primary-color);
        }

        .header {
            background: var(--primary-color);
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .container {
            max-width: 900px;
            width: 90%;
            margin: 30px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            text-align: center;
        }

        .input-group {
            margin-bottom: 25px;
        }

        input[type="text"] {
            padding: 15px;
            width: 80%;
            max-width: 400px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            font-family: 'Tajawal', sans-serif;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--accent-color);
        }

        .btn-download {
            background-color: var(--accent-color);
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.2s;
            margin-top: 10px;
        }

        .btn-download:hover {
            transform: scale(1.05);
            background-color: #a93226;
        }

        #canvasContainer {
            margin-top: 20px;
            position: relative;
            overflow: auto;
            border: 1px solid #eee;
            border-radius: 10px;
        }

        canvas {
            max-width: 100%;
            height: auto;
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 14px;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>منصة إصدار شهادات المعرض الفني</h1>
        <p>بإشراف الأستاذ: أحمد الحربي</p>
    </div>

    <div class="container">
        <h3>أدخل الاسم المراد ظهوره في الشهادة</h3>
        <div class="input-group">
            <input type="text" id="userName" placeholder="اكتب اسم الطالب/ـة هنا..." autocomplete="off">
        </div>

        <div id="canvasContainer">
            <canvas id="certCanvas" width="1200" height="850"></canvas>
        </div>

        <button class="btn-download" onclick="downloadCert()">تحميل الشهادة بجودة عالية (PNG)</button>
    </div>

    <footer>
        جميع الحقوق محفوظة &copy; 2026 - مدرسة إمام يعقوب بن إسحاق الحضرمي
    </footer>

    <script>
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('userName');

        // تحميل صورة الشهادة
        const bgImage = new Image();
        bgImage.src = 'certificate.png'; // يجب أن يكون اسم ملف الصورة مطابقاً لهذا الاسم في المجلد

        bgImage.onload = () => {
            renderCertificate('');
        };

        function renderCertificate(name) {
            // رسم الخلفية
            ctx.drawImage(bgImage, 0, 0, canvas.width, canvas.height);

            // إعدادات النص
            ctx.fillStyle = '#2c3e50'; // لون الاسم (عدله ليناسب تصميمك)
            ctx.font = 'bold 60px "Amiri"'; // الخط الأميري يناسب الشهادات
            ctx.textAlign = 'center';

            // موقع النص (هنا تحتاج لتجربة الأرقام 600 و 450 لتناسب مكان الاسم في تصميمك)
            ctx.fillText(name, 600, 550);
        }

        // تحديث لحظي عند الكتابة
        nameInput.addEventListener('input', (e) => {
            renderCertificate(e.target.value);
        });

        // وظيفة التحميل
        function downloadCert() {
            const link = document.createElement('a');
            link.download = `شهادة-${nameInput.value || 'مشارك'}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        }
    </script>
</body>
</html>
