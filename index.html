<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إصدار شهادة</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 60px;
    background: #f5f5f5;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 320px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
    width: 90%;
    padding: 10px;
    font-size: 16px;
    margin-top: 15px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 15px;
    cursor: pointer;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
}

button:hover {
    background: #0056b3;
}
</style>

</head>
<body>

<div class="container">
    <h2>إصدار شهادة</h2>

    <input type="text" id="name" placeholder="اكتب اسم الطالب">

    <br>
    <button onclick="generatePDF()">تحميل الشهادة</button>
</div>

<script>
async function generatePDF() {

    const name = document.getElementById("name").value;
    if (!name) return alert("اكتب الاسم");

    // تحميل PDF
    const existingPdfBytes = await fetch("template.pdf").then(res => res.arrayBuffer());
    const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
    const page = pdfDoc.getPages()[0];

    // 🎨 إنشاء Canvas لكتابة الاسم بالعربي بشكل صحيح
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");

    canvas.width = 800;
    canvas.height = 200;

    ctx.fillStyle = "black";
    ctx.font = "40px Arial";
    ctx.textAlign = "center";
    ctx.direction = "rtl";

    ctx.fillText(name, canvas.width / 2, 100);

    // تحويل إلى صورة
    const imgData = canvas.toDataURL("image/png");

    // إدخال الصورة في PDF
    const pngImage = await pdfDoc.embedPng(imgData);

    page.drawImage(pngImage, {
        x: 500,   // ← عدل هنا حسب مكان الاسم
        y: 605,
        width: 350,
        height: 80
    });

    const pdfBytes = await pdfDoc.save();

    // تحميل
    const blob = new Blob([pdfBytes], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);

    const link = document.createElement("a");
    link.href = url;
    link.download = "certificate.pdf";
    document.body.appendChild(link);
    link.click();

    document.body.removeChild(link);
    URL.revokeObjectURL(url);
}
</script>

</body>
</html>
