<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>منصة الشهادات الاحترافية</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        .controls { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { padding: 12px; font-size: 18px; border: 2px solid #ddd; border-radius: 8px; width: 300px; text-align: center; }
        button { padding: 12px 25px; background: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 18px; margin-right: 10px; }
        
        /* حاوية الشهادة - مخفية عن العرض المباشر وتستخدم للتصدير فقط */
        #certificate-area {
            position: relative;
            width: 1024px; /* نفس أبعاد صورتك */
            height: 731px;
            background-image: url('certificate.png.jpg'); /* استخدم ملفك المرفوع */
            background-size: cover;
            display: none; /* تظهر فقط عند المعالجة */
        }
        .student-name {
            position: absolute;
            top: 590px; /* مكان اسم هشام */
            left: 0;
            right: 0;
            text-align: center;
            font-size: 40px;
            color: #1a1a1a;
        }
    </style>
</head>
<body>

    <div class="controls">
        <h2>مولد شهادات الطلاب</h2>
        <input type="text" id="nameInput" placeholder="اكتب اسم الطالب هنا...">
        <button onclick="downloadPDF()">تحميل PDF عالي الجودة</button>
    </div>

    <div id="certificate-area" style="display: block;">
        <div class="student-name" id="displayPath"></div>
    </div>

    <script>
        const nameInput = document.getElementById('nameInput');
        const displayPath = document.getElementById('displayPath');

        nameInput.addEventListener('input', () => {
            displayPath.innerText = nameInput.value;
        });

        async function downloadPDF() {
            if (!nameInput.value) return alert("يرجى كتابة الاسم");
            
            const btn = document.querySelector('button');
            btn.innerText = "جاري الحفظ...";
            
            const element = document.getElementById('certificate-area');
            
            // تحويل الـ HTML إلى صورة عالية الدقة (Scale 3 لضمان عدم البكسلة)
            const canvas = await html2canvas(element, {
                scale: 3, 
                useCORS: true,
                logging: false
            });
            
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            
            // إنشاء ملف PDF بمقاسات الشهادة الأصلية
            const pdf = new jsPDF({
                orientation: 'landscape',
                unit: 'px',
                format: [1024, 731]
            });
            
            pdf.addImage(imgData, 'PNG', 0, 0, 1024, 731);
            pdf.save(`شهادة_${nameInput.value}.pdf`);
            
            btn.innerText = "تحميل PDF عالي الجودة";
        }
    </script>
</body>
</html>
