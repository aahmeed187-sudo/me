<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>شهادة PDF</title>

<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<style>
body {
    text-align: center;
    font-family: Arial;
    margin-top: 50px;
}
input, button {
    padding: 10px;
    font-size: 16px;
    margin: 10px;
}
</style>

</head>
<body>

<h2>إصدار شهادة</h2>

<input type="text" id="name" placeholder="اكتب اسمك">
<br>
<button onclick="generatePDF()">تحميل الشهادة</button>

<script>
async function generatePDF() {

    const name = document.getElementById("name").value;
    if (!name) return alert("اكتب اسمك");

    // تحميل ملف PDF القالب
    const existingPdfBytes = await fetch('certificate.pdf').then(res => res.arrayBuffer());

    const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
    const pages = pdfDoc.getPages();
    const firstPage = pages[0];

    // كتابة الاسم (غير المكان حسب تصميمك)
    firstPage.drawText(name, {
        x: 200,
        y: 300,
        size: 24
    });

    const pdfBytes = await pdfDoc.save();

    // تحميل الملف
    const blob = new Blob([pdfBytes], { type: 'application/pdf' });
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'certificate.pdf';
    link.click();
}
</script>

</body>
</html>
