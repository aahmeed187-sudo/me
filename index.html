<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>إصدار شهادة</title>

<!-- pdf-lib -->
<script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>

<!-- fontkit (مهم للعربي) -->
<script src="https://unpkg.com/@pdf-lib/fontkit/dist/fontkit.umd.js"></script>

<style>
body {
    font-family: Arial;
    text-align: center;
    margin-top: 60px;
    background: #f5f5f5;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 10px;
    width: 320px;
    margin: auto;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

input {
    width: 90%;
    padding: 10px;
    font-size: 16px;
    margin-top: 15px;
}

button {
    padding: 10px 20px;
    font-size: 16px;
    margin-top: 15px;
    cursor: pointer;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 5px;
}

button:hover {
    background: #0056b3;
}
</style>

</head>
<body>

<div class="container">
    <h2>إصدار شهادة</h2>

    <input type="text" id="name" placeholder="اكتب اسم الطالب">

    <br>
    <button onclick="generatePDF()">تحميل الشهادة</button>
</div>

<script>
async function generatePDF() {

    try {
        const name = document.getElementById("name").value;

        if (!name) {
            alert("اكتب اسم الطالب");
            return;
        }

        // تحميل القالب
        const pdfBytes = await fetch("template.pdf").then(res => res.arrayBuffer());

        // تحميل الخط العربي
        const fontBytes = await fetch("Cairo-Regular.ttf").then(res => res.arrayBuffer());

        // فتح PDF
        const pdfDoc = await PDFLib.PDFDocument.load(pdfBytes);

        // تسجيل الخط
        pdfDoc.registerFontkit(window.fontkit);
        const customFont = await pdfDoc.embedFont(fontBytes);

        const page = pdfDoc.getPages()[0];

        // ✨ عكس النص (حل بسيط للعربي)
page.drawText(name, {
        // كتابة الاسم
        page.drawText(name, {
    x: 380,   // ← البداية من اليمين
    y: 355,
    size: 26,
    font: customFont
});

        // حفظ
        const finalPdf = await pdfDoc.save();

        // تحميل
        const blob = new Blob([finalPdf], { type: "application/pdf" });
        const url = URL.createObjectURL(blob);

        const link = document.createElement("a");
        link.href = url;
        link.download = "certificate.pdf";
        document.body.appendChild(link);
        link.click();

        document.body.removeChild(link);
        URL.revokeObjectURL(url);

    } catch (error) {
        console.error(error);
        alert("❌ تأكد من وجود الملفات (PDF + الخط)");
    }
}
</script>

</body>
</html>
