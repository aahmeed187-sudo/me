<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مولد شهادات الفيكتور</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; }
        canvas { border: 1px solid #ccc; max-width: 100%; height: auto; margin-top: 20px; border-radius: 8px; }
        input { padding: 12px; font-size: 18px; width: 300px; border: 2px solid #ddd; border-radius: 8px; margin-bottom: 10px; outline: none; }
        input:focus { border-color: #27ae60; }
        button { padding: 12px 25px; background-color: #27ae60; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #219150; }
    </style>
</head>
<body>

    <div class="container">
        <h2>إصدار شهادة تفوق (SVG)</h2>
        <input type="text" id="nameInput" placeholder="أدخل اسم الطالب المبدع...">
        <br>
        <button onclick="downloadPDF()">تحميل الشهادة PDF</button>
        <br>
        <canvas id="certCanvas"></canvas>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        const canvas = document.getElementById('certCanvas');
        const ctx = canvas.getContext('2d');
        const nameInput = document.getElementById('nameInput');

        const svgImg = new Image();
        svgImg.src = 'certificate.svg'; // تأكد من رفع الملف بهذا الاسم

        svgImg.onload = function() {
            // ضبط أبعاد الكانفاس لتطابق أبعاد الفيكتور الأصلية
            canvas.width = svgImg.width || 1024; 
            canvas.height = svgImg.height || 731;
            draw();
        };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(svgImg, 0, 0, canvas.width, canvas.height);
            
            // إعدادات الخط (عدل الأرقام لتناسب مكان الاسم)
            ctx.font = 'bold 45px Arial'; // يمكنك تغيير Arial لأي خط عربي بالنظام
            ctx.fillStyle = '#1a1a1a';
            ctx.textAlign = 'center';
            
            // الإحداثيات التي استخرجناها لصورتك (500 عرض، 605 ارتفاع)
            ctx.fillText(nameInput.value, 512, 605);
        }

        nameInput.addEventListener('input', draw);

        async function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({
                orientation: 'landscape',
                unit: 'px',
                format: [canvas.width, canvas.height]
            });

            const imgData = canvas.toDataURL('image/png', 1.0);
            doc.addImage(imgData, 'PNG', 0, 0, canvas.width, canvas.height);
            doc.save(`شهادة_${nameInput.value}.pdf`);
        }
    </script>
</body>
</html>
